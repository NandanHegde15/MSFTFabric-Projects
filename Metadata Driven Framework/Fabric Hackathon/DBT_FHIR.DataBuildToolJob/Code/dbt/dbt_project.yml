name: 'my_dbt_project'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
test-paths: ["tests"]
docs-paths: ["docs"]
asset-paths: ["assets"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  my_dbt_project:
    # ── Silver layer ──────────────────────────────────────────────────────────
    # Materialised as TABLES so downstream gold models can join efficiently.
    # Schema override uses the custom generate_schema_name macro so dbt writes
    Silver:
      +materialized: table
      +schema: Silver
      +tags: ["Silver"]

    # ── Gold layer ────────────────────────────────────────────────────────────
    # Materialised as TABLES for BI / reporting consumption.
    Gold:
      +materialized: table
      +schema: Gold
      +tags: ["Gold"]
